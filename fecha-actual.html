<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fecha Actual en JavaScript</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px; color: #333; }
        .contenedor { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; }
        button { display: block; width: 100%; margin: 10px 0; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #salida-inner { margin-top: 15px; padding: 15px; background-color: #e9ecef; border-radius: 5px; display: none; text-align: center; font-size: 18px; font-weight: bold;}
    </style>
</head>
<body>

<div class="contenedor">
    <h2>Obtener la Fecha Actual</h2>
    <p>Haz clic en el botón para generar la fecha actual utilizando la estructura <strong>switch</strong>:</p>

    <button onclick="mostrarFecha()">Mostrar Fecha</button>
    <div id="salida-inner"></div>
</div>

<script>
    function mostrarFecha() {
        let fecha = new Date();
        let diaNum = fecha.getDay();
        let mesNum = fecha.getMonth();
        let dia = fecha.getDate();
        let anio = fecha.getFullYear();
        
        let diaSemana = "";
        let mes = "";

        // Switch para el día de la semana
        switch (diaNum) {
            case 0: diaSemana = "domingo"; break;
            case 1: diaSemana = "lunes"; break;
            case 2: diaSemana = "martes"; break;
            case 3: diaSemana = "miércoles"; break;
            case 4: diaSemana = "jueves"; break;
            case 5: diaSemana = "viernes"; break;
            case 6: diaSemana = "sábado"; break;
        }

        // Switch para el mes
        switch (mesNum) {
            case 0: mes = "Enero"; break;
            case 1: mes = "Febrero"; break;
            case 2: mes = "Marzo"; break;
            case 3: mes = "Abril"; break;
            case 4: mes = "Mayo"; break;
            case 5: mes = "Junio"; break;
            case 6: mes = "Julio"; break;
            case 7: mes = "Agosto"; break;
            case 8: mes = "Septiembre"; break;
            case 9: mes = "Octubre"; break;
            case 10: mes = "Noviembre"; break;
            case 11: mes = "Diciembre"; break;
        }

        let formatoFinal = `Hoy es ${diaSemana} ${dia} de ${mes} del año ${anio}`;
        
        let divSalida = document.getElementById("salida-inner");
        divSalida.innerHTML = formatoFinal;
        divSalida.style.display = "block";
    }
</script>

</body>
</html>
